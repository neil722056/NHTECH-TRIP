<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>v8 CRM Dashboard Pro</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .ok { color: green; }
    .fail { color: red; }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 5px;
    }

    .blue { background: #3498db; color: white; }
    .red { background: #e74c3c; color: white; }

    .bar {
      width: 100%;
      height: 10px;
      background: #eee;
      border-radius: 10px;
      overflow: hidden;
    }

    .bar-inner {
      height: 100%;
      width: 0%;
      background: #2ecc71;
      transition: 0.3s;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 10px;
      height: 200px;
      overflow: auto;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<h2>🚀 v8 CRM Dashboard Pro</h2>

<!-- ========================= -->
<!-- SYSTEM STATUS -->
<!-- ========================= -->
<div class="card">
  <h3>📊 System Status</h3>

  <p>CRM ID: <span id="crmId">-</span></p>
  <p>Version: <span id="version">-</span></p>
  <p>API Status: <span id="apiStatus">Checking...</span></p>

  <p>
    CRM URL:
    <a id="crmUrl" target="_blank">-</a>
  </p>
</div>

<!-- ========================= -->
<!-- PROGRESS -->
<!-- ========================= -->
<div class="card">
  <h3>⚙️ System Activity</h3>

  <div class="bar">
    <div class="bar-inner" id="bar"></div>
  </div>

  <p id="activity">Idle</p>
</div>

<!-- ========================= -->
<!-- ACTION -->
<!-- ========================= -->
<div class="card">
  <h3>🧠 Actions</h3>

  <button class="blue" onclick="reinstall()">🔄 Reinstall</button>
  <button class="red" onclick="resetSystem()">🧨 Reset</button>
</div>

<!-- ========================= -->
<!-- LOG -->
<!-- ========================= -->
<div class="card">
  <h3>🧾 Debug Log</h3>
  <pre id="log">Booting...</pre>
</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxS1JueOIcz4DdwJHxiA-9GqMhY4Z1cWyOBSrv5tIoF3kEnR9sqEEd1PrNsTDyLBuUb/exec";

// =========================
// LOG SYSTEM
// =========================
function log(msg) {
  const el = document.getElementById("log");
  el.innerText += "\n" + msg;
  el.scrollTop = el.scrollHeight;
  console.log(msg);
}

// =========================
// PROGRESS BAR
// =========================
function setProgress(p) {
  document.getElementById("bar").style.width = p + "%";
}

// =========================
// LOAD STATUS
// =========================
async function loadStatus() {

  log("📡 checking system...");

  try {

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 5000);

    const res = await fetch(GAS_URL + "?path=state", {
      signal: controller.signal
    });

    clearTimeout(timeout);

    const state = await res.json();

    document.getElementById("crmId").innerText = state.crmId || "-";
    document.getElementById("version").innerText = state.version || "-";

    document.getElementById("apiStatus").innerHTML =
      '<span class="ok">✔ Online</span>';

    if (state.crmUrl) {
      document.getElementById("crmUrl").href = state.crmUrl;
      document.getElementById("crmUrl").innerText = "Open CRM";
    }

    setProgress(100);
    document.getElementById("activity").innerText = "System Ready";

    log("✔ system healthy");

  } catch (err) {

    document.getElementById("apiStatus").innerHTML =
      '<span class="fail">❌ Offline</span>';

    document.getElementById("activity").innerText = "API Error";

    setProgress(10);

    log("❌ API failed: " + err.message);
  }
}

// =========================
// REINSTALL
// =========================
async function reinstall() {

  // 🧠 先鎖 lifecycle
  await fetch(GAS_URL + "?action=reset");
  await fetch(GAS_URL + "?action=lifecycle&mode=RESETTING");

  window.location.href = "setup.html?reinstall=1";
}

// =========================
// RESET
// =========================
async function resetSystem() {

  log("🧨 reset system");
  setProgress(20);

  try {

    const res = await fetch(GAS_URL + "?path=reset");
    const data = await res.json();

    log("✔ reset: " + JSON.stringify(data));

    setProgress(0);

  } catch (err) {

    log("❌ reset failed: " + err.message);
  }
}

// =========================
// AUTO REFRESH（🔥 PRO 功能）
// =========================
setInterval(loadStatus, 5000);

// =========================
// BOOT
// =========================
document.addEventListener("DOMContentLoaded", () => {
  loadStatus();
});

</script>

</body>
</html>
