<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CRM v8 Installer</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 60px;
}

h2 {
  margin-bottom: 20px;
}

.bar {
  width: 100%;
  height: 18px;
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 20px;
}

.progress {
  height: 100%;
  width: 0%;
  background: #22c55e;
  transition: 0.4s;
}

.log {
  margin-top: 20px;
  text-align: left;
  background: #111827;
  padding: 12px;
  height: 200px;
  overflow-y: auto;
  font-size: 12px;
  border-radius: 8px;
}

button {
  padding: 12px 24px;
  font-size: 16px;
  margin-top: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>🚀 CRM v8 安裝器</h2>

<button onclick="install()">一鍵安裝</button>

<div class="bar">
  <div id="bar" class="progress"></div>
</div>

<div class="log" id="log"></div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbymF5s_0BVe8_kqhsGJXAnY9icWcPSgYeDVylA8g_0O0CKQXTFC_yxYmTtQTVQTYqLd/exec";

function log(msg) {
  const el = document.getElementById("log");
  el.innerHTML += "• " + msg + "<br>";
  el.scrollTop = el.scrollHeight;
}

function setProgress(p) {
  document.getElementById("bar").style.width = p + "%";
}

function install() {

  log("🚀 開始安裝...");
  setProgress(10);

  log("📡 呼叫 GAS install...");

  setProgress(30);

  // 🚨 重點：不用 fetch，直接跳轉（避免 Failed to fetch）
  setTimeout(() => {

    log("📦 建立 CRM 系統中...");

    setProgress(60);

    setTimeout(() => {

      log("🔐 設定權限與 token...");

      setProgress(80);

      setTimeout(() => {

        log("✅ 安裝完成，正在進入 CRM...");

        setProgress(100);

        // 🔥 正確 GAS redirect（避免相對路徑錯誤）
        window.location.href =
          GAS_URL + "?path=install";

      }, 800);

    }, 800);

  }, 500);
}

</script>

</body>
</html>
