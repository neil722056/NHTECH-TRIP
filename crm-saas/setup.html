<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CRM v8 Installer</title>
</head>

<body style="font-family:Arial;text-align:center;padding:60px;background:#0f172a;color:white">

<h2>🚀 CRM v8 SaaS 安裝器</h2>

<button onclick="install()" style="padding:15px 30px;font-size:18px;">
一鍵安裝
</button>

<script>

function install() {
  fetch("https://script.google.com/macros/s/AKfycbz1SM78cxu8W7gQzzr5n4COSNBnRy_wRzsQKQFD9MbhgzwuCrawBJXXcqVfzpcDUbo9/exec?path=install")
    .then(res => res.text())
    .then(html => {
      document.open();
      document.write(html);
      document.close();
    });
}

</script>

</body>
</html>
