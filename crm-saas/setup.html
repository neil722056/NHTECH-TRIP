<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CRM Setup v8.1.4</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h2 {
      margin-bottom: 20px;
    }

    .node {
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      transition: 0.3s;
    }

    .done {
      background: #22c55e;
    }

    .running {
      background: #f59e0b;
    }

    .wait {
      background: #334155;
    }

    .error {
      background: #ef4444;
    }

    .container {
      max-width: 500px;
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .statusBox {
      margin-top: 20px;
      padding: 10px;
      background: #1e293b;
      border-radius: 8px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<h2>🚀 CRM Install (v8.1.4 Visual Engine)</h2>

<div class="container" id="flow"></div>

<div class="statusBox" id="status">Waiting...</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxS1JueOIcz4DdwJHxiA-9GqMhY4Z1cWyOBSrv5tIoF3kEnR9sqEEd1PrNsTDyLBuUb/exec";

const nodes = [
  "CHECK PERMISSION",
  "CREATE SPREADSHEET",
  "CREATE TABLES",
  "WRITE CONFIG",
  "API READY",
  "FINALIZE"
];

let lastState = {};

function renderFlow(state) {

  const flow = document.getElementById("flow");
  flow.innerHTML = "";

  nodes.forEach((n, i) => {

    let className = "node wait";

    if (state.step > i) className = "node done";
    if (state.step == i) className = "node running";

    if (state.status === "ERROR") className = "node error";

    const div = document.createElement("div");
    div.className = className;

    div.innerHTML = `
      <span>${i + 1}. ${n}</span>
      <span>${className.split(" ")[1]}</span>
    `;

    flow.appendChild(div);
  });
}

async function fetchState() {

  try {

    const res = await fetch(GAS_URL + "?action=state&t=" + Date.now());
    const data = await res.json();

    const state = data.state;

    document.getElementById("status").innerText =
      "Status: " + state.status + " | Step: " + state.step;

    renderFlow(state);

    lastState = state;

    // 🚀 AUTO REDIRECT
    if (state.status === "DONE") {
      window.location.href = "dashboard.html";
    }

  } catch (err) {

    document.getElementById("status").innerText =
      "ERROR: " + err.message;

  }
}

// 🔁 polling (real-time flow)
setInterval(fetchState, 1000);

fetchState();

</script>

</body>
</html>
