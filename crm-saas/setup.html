<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CRM Setup v8.1.4</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 24px;
    }

    h2 {
      margin-bottom: 20px;
    }

    .container {
      max-width: 520px;
    }

    .node {
      padding: 12px 14px;
      margin: 8px 0;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      transition: 0.3s;
      font-size: 14px;
    }

    .done {
      background: #22c55e;
    }

    .running {
      background: #f59e0b;
    }

    .wait {
      background: #334155;
    }

    .error {
      background: #ef4444;
    }

    .statusBox {
      margin-top: 20px;
      padding: 12px;
      background: #1e293b;
      border-radius: 10px;
      font-size: 13px;
    }

    .title {
      margin-bottom: 10px;
      color: #93c5fd;
    }
  </style>
</head>

<body>

<h2>🚀 CRM Install Setup (v8.1.4 Visual Engine)</h2>

<div class="container">

  <div id="flow"></div>

  <div class="statusBox">
    <div class="title">System Status</div>
    <div id="status">Waiting...</div>
  </div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxS1JueOIcz4DdwJHxiA-9GqMhY4Z1cWyOBSrv5tIoF3kEnR9sqEEd1PrNsTDyLBuUb/exec"; // 🔥 改成你的

/***********************
 * 🧠 INSTALL FLOW NODES
 ***********************/
const nodes = [
  "CHECK PERMISSION",
  "CREATE SPREADSHEET",
  "CREATE TABLES",
  "WRITE CONFIG",
  "API READY",
  "FINALIZE"
];

/***********************
 * 🎨 RENDER FLOW (Figma-like UI)
 ***********************/
function renderFlow(state) {

  const flow = document.getElementById("flow");
  flow.innerHTML = "";

  nodes.forEach((n, i) => {

    let className = "node wait";

    if (state.status === "ERROR") {
      className = "node error";
    } else if (state.step > i) {
      className = "node done";
    } else if (state.step == i) {
      className = "node running";
    }

    const div = document.createElement("div");
    div.className = className;

    div.innerHTML = `
      <span>${i + 1}. ${n}</span>
      <span>${className.replace("node ", "")}</span>
    `;

    flow.appendChild(div);
  });
}

/***********************
 * 📡 FETCH STATE
 ***********************/
async function fetchState() {

  try {

    const res = await fetch(
      GAS_URL + "?action=state&t=" + Date.now()
    );

    const data = await res.json();
    const state = data.state || {};

    console.log("STATE:", state);

    /***********************
     * UI STATUS
     ***********************/
    document.getElementById("status").innerText =
      "Status: " + state.status +
      " | Step: " + state.step +
      " | Msg: " + (state.msg || "");

    renderFlow(state);

    /***********************
     * 🚀 AUTO REDIRECT
     ***********************/
    if (state.status === "DONE") {
      window.location.href = "dashboard.html";
    }

  } catch (err) {

    document.getElementById("status").innerText =
      "Error: " + err.message;

    console.error("BOOT ERROR:", err);
  }
}

/***********************
 * 🔁 LIVE POLLING (REAL-TIME FLOW)
 ***********************/
setInterval(fetchState, 1000);

/***********************
 * 🚀 INIT
 ***********************/
fetchState();

</script>

</body>
</html>
