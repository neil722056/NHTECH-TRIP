<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>CRM Loader</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      text-align: center;
      background: #111827;
      padding: 20px;
      border-radius: 12px;
    }

    .loading {
      color: #fbbf24;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>CRM Boot Loader</h2>
  <div id="status" class="loading">Checking system...</div>
</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxS1JueOIcz4DdwJHxiA-9GqMhY4Z1cWyOBSrv5tIoF3kEnR9sqEEd1PrNsTDyLBuUb/exec";

/**************************************************
 * 🚀 BOOT CHECK
 **************************************************/
async function boot() {

  try {

    const res = await fetch(GAS_URL + "?action=state&t=" + Date.now());
    const data = await res.json();
    const s = data.state || {};

    document.getElementById("status").innerText =
      "Version: " + (s.version || "-");

    /**************************************************
     * 🧠 ROUTE DECISION (CONTROL PLANE)
     **************************************************/
    setTimeout(() => {

      if (!s.crmId || s.status === "IDLE") {
        window.location.href = "setup.html";
      } else {
        window.location.href = "dashboard.html";
      }

    }, 600);

  } catch (e) {

    document.getElementById("status").innerText =
      "Error loading system";

    console.error(e);
  }
}

boot();

</script>

</body>
</html>
