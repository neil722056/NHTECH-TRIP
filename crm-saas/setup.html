<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CRM Setup</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 24px;
    }

    h2 {
      margin-bottom: 20px;
      color: #93c5fd;
    }

    .container {
      max-width: 520px;
    }

    .node {
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      transition: 0.25s;
      font-size: 14px;
    }

    .done { background: #22c55e; }
    .running { background: #f59e0b; }
    .wait { background: #334155; }
    .error { background: #ef4444; }

    .statusBox {
      margin-top: 20px;
      padding: 12px;
      background: #1e293b;
      border-radius: 10px;
      font-size: 13px;
    }

    .small {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 6px;
    }
  </style>
</head>

<body>

<h2 id="title">CRM Install Setup</h2>

<div class="container">

  <div id="flow"></div>

  <div class="statusBox">
    <div id="status">Loading...</div>
    <div class="small" id="meta"></div>
  </div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxS1JueOIcz4DdwJHxiA-9GqMhY4Z1cWyOBSrv5tIoF3kEnR9sqEEd1PrNsTDyLBuUb/exec"; // 🔥 改這裡

/***********************
 * 🧠 FLOW NODES
 ***********************/
const nodes = [
  "CHECK PERMISSION",
  "CREATE SPREADSHEET",
  "CREATE TABLES",
  "WRITE CONFIG",
  "API READY",
  "FINALIZE"
];

/***********************
 * 🎨 RENDER FLOW
 ***********************/
function renderFlow(state) {

  const flow = document.getElementById("flow");
  flow.innerHTML = "";

  nodes.forEach((n, i) => {

    let cls = "node wait";

    if (state.status === "ERROR") {
      cls = "node error";
    } else if (state.step > i) {
      cls = "node done";
    } else if (state.step == i) {
      cls = "node running";
    }

    const div = document.createElement("div");
    div.className = cls;

    div.innerHTML = `
      <span>${i + 1}. ${n}</span>
      <span>${cls.replace("node ", "")}</span>
    `;

    flow.appendChild(div);
  });
}

/***********************
 * 📡 FETCH STATE
 ***********************/
async function fetchState() {

  try {

    const res = await fetch(
      GAS_URL + "?action=state&t=" + Date.now()
    );

    const data = await res.json();
    const state = data.state || {};

    document.getElementById("status").innerText =
      "Status: " + state.status +
      " | Step: " + state.step +
      " | Msg: " + (state.msg || "");

    document.getElementById("meta").innerText =
      "CRM ID: " + (state.crmId || "-");

    renderFlow(state);

    // 🚀 AUTO REDIRECT
    if (state.status === "DONE") {
      window.location.href = "dashboard.html";
    }

  } catch (err) {

    document.getElementById("status").innerText =
      "Error: " + err.message;
  }
}

/***********************
 * 🚀 LOAD VERSION (AUTO SYNC)
 ***********************/
async function loadVersion() {

  try {

    const res = await fetch(
      GAS_URL + "?action=version&t=" + Date.now()
    );

    const data = await res.json();

    document.getElementById("title").innerText =
      "CRM Install Setup (" + data.version + " Visual Engine)";

  } catch (e) {
    console.log("version load fail");
  }
}

/***********************
 * 🔁 POLLING ENGINE
 ***********************/
setInterval(fetchState, 1000);

/***********************
 * 🚀 INIT
 ***********************/
loadVersion();
fetchState();

</script>

</body>
</html>
