<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CRM Boot</title>
</head>

<body>
<h3>🚀 Booting system...</h3>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxS1JueOIcz4DdwJHxiA-9GqMhY4Z1cWyOBSrv5tIoF3kEnR9sqEEd1PrNsTDyLBuUb/exec";

async function boot() {

  try {

    const res = await fetch(GAS_URL + "?action=state");
    const data = await res.json();

    const state = data.state;

    console.log("STATE:", state);

    /***********************
     * 🧠 STATE ROUTING
     ***********************/
    if (state.status === "DONE") {

      window.location.href = "dashboard.html";
      return;
    }

    if (state.status === "IDLE" || !state.status) {

      window.location.href = "setup.html";
      return;
    }

    if (state.status === "RUNNING") {

      // install running → stay in dashboard mode
      window.location.href = "dashboard.html";
      return;
    }

    if (state.status === "ERROR") {

      alert("System error detected, redirecting to setup");
      window.location.href = "setup.html";
      return;
    }

    // fallback
    window.location.href = "dashboard.html";

  } catch (err) {

    console.error("BOOT FAIL:", err);

    // fallback safe mode
    window.location.href = "setup.html";
  }
}

boot();

</script>
</body>
</html>
