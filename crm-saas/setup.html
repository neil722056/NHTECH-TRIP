<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>CRM Setup v8.3.2</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #0f172a;
      color: white;
    }

    .box {
      background: #111827;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .step {
      margin: 6px 0;
    }

    .running { color: #fbbf24; }
    .done { color: #22c55e; }
    .wait { color: #6b7280; }

    button {
      padding: 8px 12px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>CRM Install Setup (v8.3.2)</h2>

    <div id="status">Status: loading...</div>
    <div id="msg"></div>
    <div id="version"></div>
    <div id="crmId"></div>
  </div>

  <div class="box">
    <h3>Install Flow</h3>

    <div id="steps"></div>
  </div>

  <button onclick="resetSystem()">RESET</button>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxS1JueOIcz4DdwJHxiA-9GqMhY4Z1cWyOBSrv5tIoF3kEnR9sqEEd1PrNsTDyLBuUb/exec"; // ← 改這裡

let installing = false;

/**************************************************
 * 🚀 STATE POLLING LOOP
 **************************************************/
setInterval(fetchState, 1200);
fetchState();

/**************************************************
 * 🧠 FETCH STATE + SMART BOOT
 **************************************************/
async function fetchState() {

  const res = await fetch(GAS_URL + "?action=state&t=" + Date.now());
  const data = await res.json();
  const state = data.state || {};

  document.getElementById("status").innerText =
    "Status: " + (state.status || "");

  document.getElementById("msg").innerText =
    state.msg || "";

  document.getElementById("version").innerText =
    "Version: " + (state.version || "");

  document.getElementById("crmId").innerText =
    "CRM ID: " + (state.crmId || "");

  renderSteps(state);

  /**************************************************
   * 🚀 v8.3.2 SMART BOOT ENGINE
   **************************************************/
  const bootRes = await fetch(GAS_URL + "?action=bootCheck&t=" + Date.now());
  const boot = await bootRes.json();

  if (boot.needInstall && !installing) {
    startInstall();
  }

  if (state.status === "DONE") {
    window.location.href = "dashboard.html";
  }
}

/**************************************************
 * 🚀 INSTALL TRIGGER
 **************************************************/
async function startInstall() {

  installing = true;

  document.getElementById("msg").innerText = "Installing...";

  const res = await fetch(GAS_URL + "?action=install");
  const data = await res.json();

  console.log("INSTALL RESULT:", data);

  installing = false;
}

/**************************************************
 * 🔁 RESET
 **************************************************/
async function resetSystem() {

  await fetch(GAS_URL + "?action=reset");

  document.getElementById("msg").innerText = "Reset done, waiting boot...";
}

/**************************************************
 * 📊 RENDER STEPS
 **************************************************/
function renderSteps(state) {

  const container = document.getElementById("steps");

  const steps = [
    { id: 1, name: "CHECK PERMISSION" },
    { id: 2, name: "CREATE SPREADSHEET" },
    { id: 3, name: "CREATE TABLES" },
    { id: 4, name: "WRITE CONFIG" },
    { id: 5, name: "API READY" },
    { id: 6, name: "FINALIZE" }
  ];

  container.innerHTML = "";

  steps.forEach(s => {

    let cls = "wait";

    if (state.step == s.id) cls = "running";
    if (state.step > s.id) cls = "done";

    container.innerHTML += `
      <div class="step ${cls}">
        ${s.id}. ${s.name}
      </div>
    `;
  });
}

</script>

</body>
</html>
