<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CRM Auto Bootstrap</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 24px;
    }

    h2 { color: #60a5fa; }

    .box {
      padding: 12px;
      background: #1e293b;
      border-radius: 10px;
      margin-top: 12px;
    }

    .running { color: #fbbf24; }
    .done { color: #22c55e; }
    .idle { color: #94a3b8; }
  </style>
</head>

<body>

<h2 id="title">CRM Auto Bootstrap</h2>

<div class="box">
  <div id="status">Booting...</div>
  <div id="step"></div>
  <div id="msg"></div>
</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxS1JueOIcz4DdwJHxiA-9GqMhY4Z1cWyOBSrv5tIoF3kEnR9sqEEd1PrNsTDyLBuUb/exec";

/***********************
 * 📡 STATE CHECK
 ***********************/
async function fetchState() {

  const res = await fetch(GAS_URL + "?action=state&t=" + Date.now());
  const data = await res.json();

  const state = data.state || {};

  document.getElementById("status").innerText =
    "Status: " + state.status;

  document.getElementById("step").innerText =
    "Step: " + state.step;

  document.getElementById("msg").innerText =
    state.msg || "";

  // 🚀 AUTO BOOTSTRAP LOGIC
  if (state.status === "IDLE" || state.step === "0") {
    startInstall();
  }

  // 🚀 DONE → DASHBOARD
  if (state.status === "DONE") {
    window.location.href = "dashboard.html";
  }
}

/***********************
 * 🚀 AUTO INSTALL TRIGGER
 ***********************/
async function startInstall() {

  document.getElementById("status").innerText = "Installing...";

  await fetch(GAS_URL + "?action=install&t=" + Date.now());

}

/***********************
 * 🔁 POLLING ENGINE
 ***********************/
setInterval(fetchState, 1200);

/***********************
 * 🚀 INIT
 ***********************/
fetchState();

</script>

</body>
</html>
