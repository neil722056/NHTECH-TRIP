<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CRM Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 24px;
    }

    h2 {
      color: #60a5fa;
    }

    .box {
      background: #1e293b;
      padding: 14px;
      border-radius: 10px;
      margin-top: 12px;
    }

    button {
      padding: 10px 14px;
      margin-right: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .danger {
      background: #ef4444;
      color: white;
    }

    .primary {
      background: #3b82f6;
      color: white;
    }

    .muted {
      opacity: 0.7;
      font-size: 13px;
    }
  </style>
</head>

<body>

<h2>CRM Dashboard</h2>

<div class="box">
  <div id="info">Loading system...</div>
</div>

<div class="box">
  <button class="primary" onclick="reinstall()">Reinstall</button>
  <button class="danger" onclick="reset()">Reset</button>
</div>

<div class="box muted">
  Version: <span id="version">-</span><br>
  Status: <span id="status">-</span>
</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxS1JueOIcz4DdwJHxiA-9GqMhY4Z1cWyOBSrv5tIoF3kEnR9sqEEd1PrNsTDyLBuUb/exec";

/***********************
 * 📡 LOAD STATUS
 ***********************/
async function loadState() {

  const res = await fetch(GAS_URL + "?action=state&t=" + Date.now());
  const data = await res.json();

  const state = data.state || {};

  document.getElementById("info").innerText =
    "STEP: " + state.step + " | MSG: " + (state.msg || "");

  document.getElementById("status").innerText =
    state.status || "UNKNOWN";
}

/***********************
 * 🚀 LOAD VERSION
 ***********************/
async function loadVersion() {

  const res = await fetch(GAS_URL + "?action=version&t=" + Date.now());
  const data = await res.json();

  document.getElementById("version").innerText =
    data.version || "-";
}

/***********************
 * 🔁 REINSTALL (SAFE)
 ***********************/
async function reinstall() {

  // 🧠 lifecycle safe reset
  await fetch(GAS_URL + "?action=reset&t=" + Date.now());

  // 🚀 go setup (NOT dashboard)
  window.location.href = "setup.html?reinstall=1";
}

/***********************
 * 🔥 FULL RESET
 ***********************/
async function reset() {

  await fetch(GAS_URL + "?action=reset&t=" + Date.now());

  loadState();
}

/***********************
 * 🔁 AUTO REFRESH
 ***********************/
setInterval(loadState, 1500);

/***********************
 * 🚀 INIT
 ***********************/
loadState();
loadVersion();

</script>

</body>
</html>
