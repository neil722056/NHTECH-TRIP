<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>CRM Setup v8.3.3</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .box {
      background: #111827;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .step {
      margin: 6px 0;
    }

    .running { color: #fbbf24; }
    .done { color: #22c55e; }
    .idle { color: #6b7280; }
  </style>
</head>

<body>

<div class="box">
  <h2>CRM Setup (v8.3.3 AUTO BOOT)</h2>

  <div id="status">Loading...</div>
  <div id="msg"></div>
  <div id="version"></div>
  <div id="crmId"></div>
</div>

<div class="box">
  <h3>Install Flow</h3>
  <div id="steps"></div>
</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxS1JueOIcz4DdwJHxiA-9GqMhY4Z1cWyOBSrv5tIoF3kEnR9sqEEd1PrNsTDyLBuUb/exec";

/**************************************************
 * 🚀 STATE POLLING (DISPLAY ONLY)
 **************************************************/
setInterval(fetchState, 1200);
fetchState();

async function fetchState() {

  const res = await fetch(GAS_URL + "?action=state&t=" + Date.now());
  const data = await res.json();
  const state = data.state || {};

  document.getElementById("status").innerText =
    "Status: " + (state.status || "");

  document.getElementById("msg").innerText =
    state.msg || "";

  document.getElementById("version").innerText =
    "Version: " + (state.version || "");

  document.getElementById("crmId").innerText =
    "CRM ID: " + (state.crmId || "");

  renderSteps(state);

  /**************************************************
   * 🚀 AUTO REDIRECT (AFTER INSTALL DONE)
   **************************************************/
  if (state.status === "DONE") {
    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 800);
  }
}

/**************************************************
 * 📊 VISUAL STEP RENDERER
 **************************************************/
function renderSteps(state) {

  const container = document.getElementById("steps");

  const steps = [
    "CHECK PERMISSION",
    "CREATE SPREADSHEET",
    "CREATE TABLES",
    "WRITE CONFIG",
    "API READY",
    "FINALIZE"
  ];

  container.innerHTML = "";

  steps.forEach((name, i) => {

    let cls = "idle";

    if (state.step == i + 1) cls = "running";
    if (state.step > i + 1) cls = "done";

    container.innerHTML += `
      <div class="step ${cls}">
        ${i + 1}. ${name}
      </div>
    `;
  });
}

</script>

</body>
</html>
