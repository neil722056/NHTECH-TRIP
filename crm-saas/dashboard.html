<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>CRM Dashboard v8.3.3</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      padding: 20px;
    }

    .box {
      background: #111827;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .row {
      margin: 6px 0;
    }

    button {
      padding: 8px 12px;
      margin-right: 8px;
      cursor: pointer;
    }

    .ok { color: #22c55e; }
    .warn { color: #fbbf24; }
    .bad { color: #ef4444; }
  </style>
</head>

<body>

<div class="box">
  <div class="title">CRM Dashboard</div>

  <div class="row" id="version">Version: -</div>
  <div class="row" id="crmId">CRM ID: -</div>
  <div class="row" id="step">STEP: -</div>
  <div class="row" id="msg">MSG: -</div>
  <div class="row" id="status">STATUS: -</div>
</div>

<div class="box">
  <button onclick="reset()">RESET</button>
  <button onclick="reinstall()">REINSTALL</button>
</div>

<div class="box">
  <div id="health">System: checking...</div>
</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxS1JueOIcz4DdwJHxiA-9GqMhY4Z1cWyOBSrv5tIoF3kEnR9sqEEd1PrNsTDyLBuUb/exec";

/**************************************************
 * 🚀 LIVE STATE LOOP
 **************************************************/
setInterval(loadState, 1500);
loadState();

async function loadState() {

  const res = await fetch(GAS_URL + "?action=state&t=" + Date.now());
  const data = await res.json();
  const s = data.state || {};

  document.getElementById("version").innerText =
    "Version: " + (s.version || "-");

  document.getElementById("crmId").innerText =
    "CRM ID: " + (s.crmId || "-");

  document.getElementById("step").innerText =
    "STEP: " + (s.step || "-");

  document.getElementById("msg").innerText =
    "MSG: " + (s.msg || "-");

  document.getElementById("status").innerText =
    "STATUS: " + (s.status || "-");

  /**************************************************
   * 🧠 HEALTH INDICATOR
   **************************************************/
  const health = document.getElementById("health");

  if (s.status === "DONE") {
    health.innerHTML = "System: <span class='ok'>READY</span>";
  } else if (s.status === "RUNNING") {
    health.innerHTML = "System: <span class='warn'>RUNNING</span>";
  } else if (s.status === "ERROR") {
    health.innerHTML = "System: <span class='bad'>ERROR</span>";
  } else {
    health.innerHTML = "System: <span class='warn'>IDLE</span>";
  }
}

/**************************************************
 * 🔁 RESET
 **************************************************/
async function reset() {
  await fetch(GAS_URL + "?action=reset");
}

/**************************************************
 * 🚀 REINSTALL (TRIGGERS AUTO BOOT)
 **************************************************/
async function reinstall() {
  await fetch(GAS_URL + "?action=reset");
}

</script>

</body>
</html>
