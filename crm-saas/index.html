<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CRM Boot</title>
</head>

<body>
<h3>🚀 Booting system...</h3>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxS1JueOIcz4DdwJHxiA-9GqMhY4Z1cWyOBSrv5tIoF3kEnR9sqEEd1PrNsTDyLBuUb/exec";
async function boot() {

  const res = await fetch(GAS_URL + "?action=state");
  const data = await res.json();

  const state = data.state;

  console.log("STATE:", state);

  // 🟢 已完成
  if (state.status === "DONE") {
    window.location.href = "dashboard.html";
    return;
  }

  // 🟡 安裝中 → 進 dashboard（不要丟 setup）
  if (state.status === "RUNNING") {
    window.location.href = "dashboard.html";
    return;
  }

  // 🔴 未安裝 / reset
  if (!state.status || state.status === "IDLE" || state.status === "RESET") {
    window.location.href = "setup.html";
    return;
  }

  // 🟠 fallback（避免卡死）
  window.location.href = "dashboard.html";
}
boot();
</script>
</body>
</html>
