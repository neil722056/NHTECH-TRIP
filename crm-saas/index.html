<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>CRM Boot Loader</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      text-align: center;
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      width: 300px;
    }

    .loading {
      color: #fbbf24;
    }

    .error {
      color: #ef4444;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>CRM Boot Loader</h2>
  <div id="status" class="loading">Checking system...</div>
</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxS1JueOIcz4DdwJHxiA-9GqMhY4Z1cWyOBSrv5tIoF3kEnR9sqEEd1PrNsTDyLBuUb/exec";

/**************************************************
 * 🚀 SMART BOOT ENGINE (v8.4.2 FIXED)
 **************************************************/
async function boot() {

  try {

    const res = await fetch(GAS_URL + "?action=state&t=" + Date.now());
    const data = await res.json();
    const s = data.state || {};

    document.getElementById("status").innerText =
      "Version: " + (s.version || "-");

    /**************************************************
     * 🧠 SMART ROUTING LOGIC
     **************************************************/
    setTimeout(() => {

      // 🔁 RESETTING → setup
      if (s.lifecycle === "RESETTING") {
        window.location.href = "setup.html";
        return;
      }

      // 🟡 未初始化
      if (!s.crmId || s.status === "IDLE") {
        window.location.href = "setup.html";
        return;
      }

      // 🟢 正常系統
      window.location.href = "dashboard.html";

    }, 500);

  } catch (e) {

    /**************************************************
     * 🧯 FALLBACK MODE (NO CRASH)
     **************************************************/
    console.warn("Boot retry...", e);

    document.getElementById("status").innerText =
      "Retrying connection...";

    setTimeout(boot, 1200); // 🔁 auto retry
  }
}

/**************************************************
 * 🚀 START BOOT
 **************************************************/
boot();

</script>

</body>
</html>
