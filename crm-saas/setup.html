<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🚀 CRM SaaS Setup 安裝系統</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0b1220;
      color:#e2e8f0;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      width:720px;
      background:#0f172a;
      border-radius:16px;
      padding:20px;
      box-shadow:0 20px 60px rgba(0,0,0,.6);
    }

    h2{color:#22c55e;margin-top:0;}

    .bar{
      width:100%;
      height:18px;
      background:#1f2937;
      border-radius:10px;
      overflow:hidden;
      margin-top:12px;
    }

    .progress{
      height:100%;
      width:0%;
      background:#22c55e;
      transition:width .3s;
    }

    .status{
      margin-top:10px;
      font-size:14px;
      color:#94a3b8;
      min-height:20px;
    }

    .log{
      margin-top:15px;
      background:#0b1220;
      padding:10px;
      border-radius:10px;
      height:180px;
      overflow:auto;
      font-size:12px;
      color:#cbd5e1;
    }

    button{
      margin-top:15px;
      padding:10px;
      border:none;
      border-radius:10px;
      background:#3b82f6;
      color:white;
      cursor:pointer;
    }

  </style>
</head>

<body>

<div class="box">
  <h2>🚀 CRM SaaS 一鍵安裝系統</h2>

  <div class="bar">
    <div class="progress" id="bar"></div>
  </div>

  <div class="status" id="status">等待開始安裝...</div>

  <button onclick="startInstall()">🚀 start install</button>

  <div class="log" id="log"></div>
</div>

<script>

let installing = false;
let progress = 0;

const GAS_URL = "https://script.google.com/macros/s/AKfycbz1SM78cxu8W7gQzzr5n4COSNBnRy_wRzsQKQFD9MbhgzwuCrawBJXXcqVfzpcDUbo9/exec";

function log(msg){
  const el = document.getElementById("log");
  el.innerHTML += msg + "<br>";
  el.scrollTop = el.scrollHeight;
}

function setStatus(msg){
  document.getElementById("status").innerText = msg;
}

function setBar(val){
  document.getElementById("bar").style.width = val + "%";
}

function startInstall() {

  if (installing) return;
  installing = true;

  progress = 0;
  setBar(5);

  setStatus("🚀 開始安裝...");
  log("🚀 install started");

  // 🧠 UI 模擬進度（安全）
  let step = 0;
  const steps = [
    "初始化 SaaS...",
    "建立 CRM 資料庫...",
    "部署 GAS...",
    "設定 LINE webhook...",
    "建立 AI engine...",
    "完成準備..."
  ];

  let interval = setInterval(() => {

    if (step < steps.length) {
      progress += 80 / steps.length;
      setBar(progress);
      setStatus("⏳ " + steps[step]);
      log("➡️ " + steps[step]);
      step++;
    }

    if (step >= steps.length) clearInterval(interval);

  }, 500);

  // ⚙️ 真正 API
  fetch(GAS_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      tenant: "crm_" + Date.now()
    })
  })
  .then(r => r.text())   // 🔥 避免 JSON crash
  .then(data => {

    installing = false;
    clearInterval(interval);

    console.log("RAW:", data);

    try {
      const json = JSON.parse(data);

      if (json.success) {
        setBar(100);
        setStatus("🎉 安裝完成！");
        log("✅ CRM URL: " + json.crm_url);
        log("📦 Sheet ID: " + json.sheet_id);
      } else {
        setStatus("❌ 安裝失敗");
        log("ERROR: " + data);
      }

    } catch (e) {
      setStatus("❌ 回傳格式錯誤（不是 JSON）");
      log("RAW RESPONSE:");
      log(data);
    }

  })
  .catch(err => {

    installing = false;
    clearInterval(interval);

    setStatus("❌ 連線錯誤");
    log(err.toString());

  });

}

</script>

</body>
</html>
