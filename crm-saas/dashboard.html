<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>v8 CRM Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #f6f7fb;
      padding: 20px;
    }

    .card {
      background: #fff;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    button {
      padding: 8px 12px;
      margin-right: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .blue { background: #3498db; color: #fff; }
    .red { background: #e74c3c; color: #fff; }

    pre {
      background: #111;
      color: #0f0;
      padding: 10px;
      border-radius: 6px;
      height: 180px;
      overflow: auto;
    }
  </style>
</head>

<body>

<h2>🚀 v8 CRM Dashboard</h2>

<!-- ========================= -->
<!-- STATUS -->
<!-- ========================= -->
<div class="card">
  <h3>📊 System Status</h3>

  <p>CRM ID: <span id="crmId">Loading...</span></p>
  <p>Version: <span id="version">Loading...</span></p>
  <p>
    CRM URL:
    <a id="crmUrl" target="_blank">Loading...</a>
  </p>
</div>

<!-- ========================= -->
<!-- ACTION -->
<!-- ========================= -->
<div class="card">
  <h3>🧠 Actions</h3>

  <button class="blue" onclick="reinstall()">🔄 Reinstall</button>
  <button class="red" onclick="resetSystem()">🧨 Reset</button>
</div>

<!-- ========================= -->
<!-- LOG -->
<!-- ========================= -->
<div class="card">
  <h3>🧾 Debug Log</h3>
  <pre id="log">Booting...</pre>
</div>

<script>

// 🔥 一定要改成你的 GAS Web App URL
const GAS_URL = "https://script.google.com/macros/s/AKfycbxS1JueOIcz4DdwJHxiA-9GqMhY4Z1cWyOBSrv5tIoF3kEnR9sqEEd1PrNsTDyLBuUb/exec";

// =========================
// LOG
// =========================
function log(msg) {
  const el = document.getElementById("log");
  el.innerText += "\n" + msg;
  console.log(msg);
}

// =========================
// LOAD STATUS（核心修正）
// =========================
async function loadStatus() {

  log("📡 loading state...");

  try {

    const res = await fetch(GAS_URL + "?path=state");
    const state = await res.json();

    console.log("STATE:", state);

    document.getElementById("crmId").innerText = state.crmId || "-";
    document.getElementById("version").innerText = state.version || "-";

    if (state.crmUrl) {
      document.getElementById("crmUrl").href = state.crmUrl;
      document.getElementById("crmUrl").innerText = "Open CRM";
    } else {
      document.getElementById("crmUrl").innerText = "-";
    }

    log("✔ state loaded");

  } catch (err) {

    log("❌ load failed: " + err.message);
  }
}

// =========================
// REINSTALL
// =========================
async function reinstall() {

  log("♻️ reinstall start...");

  try {

    await fetch(GAS_URL + "?path=reset");

    log("✔ reset done");

    setTimeout(() => {
      window.location.href = "setup.html";
    }, 800);

  } catch (err) {

    log("❌ reinstall failed: " + err.message);
  }
}

// =========================
// RESET ONLY
// =========================
async function resetSystem() {

  log("🧨 reset system...");

  try {

    const res = await fetch(GAS_URL + "?path=reset");
    const data = await res.json();

    log("✔ reset: " + JSON.stringify(data));

  } catch (err) {

    log("❌ reset failed: " + err.message);
  }
}

// =========================
// BOOT（🔥 關鍵）
// =========================
document.addEventListener("DOMContentLoaded", loadStatus);

</script>

</body>
</html>
