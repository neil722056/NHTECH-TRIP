<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>v8 CRM Dashboard Pro</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f6f7fb;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    button {
      padding: 8px 12px;
      margin-right: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .blue { background: #3498db; color: white; }
    .red { background: #e74c3c; color: white; }

    pre {
      background: #111;
      color: #0f0;
      padding: 10px;
      border-radius: 6px;
      height: 200px;
      overflow: auto;
    }

    .bar {
      width: 100%;
      height: 12px;
      background: #eee;
      border-radius: 10px;
      overflow: hidden;
    }

    .bar-inner {
      height: 100%;
      width: 0%;
      background: #2ecc71;
      transition: 0.3s;
    }
  </style>
</head>

<body>

<h2>🚀 v8 CRM Dashboard Pro</h2>

<!-- ========================= -->
<!-- STATUS -->
<!-- ========================= -->
<div class="card">
  <h3>📊 System Status</h3>

  <div>CRM ID: <span id="crmId">-</span></div>
  <div>Version: <span id="version">-</span></div>
  <div>
    CRM URL:
    <a id="crmUrl" target="_blank">-</a>
  </div>
</div>

<!-- ========================= -->
<!-- PROGRESS -->
<!-- ========================= -->
<div class="card">
  <h3>⚙️ Progress</h3>

  <div class="bar">
    <div class="bar-inner" id="bar"></div>
  </div>

  <div id="statusText">Idle</div>
</div>

<!-- ========================= -->
<!-- ACTIONS -->
<!-- ========================= -->
<div class="card">
  <h3>🧠 Actions</h3>

  <button class="blue" onclick="Dashboard.reinstall()">🔄 Reinstall</button>
  <button class="red" onclick="Dashboard.reset()">🧨 Reset</button>
</div>

<!-- ========================= -->
<!-- LOG -->
<!-- ========================= -->
<div class="card">
  <h3>🧾 Debug Log</h3>
  <pre id="log">Booting...</pre>
</div>

<script>

// =========================
// CONFIG
// =========================
const GAS_URL = "YOUR_GAS_WEB_APP_URL";

// =========================
// LOG MODULE
// =========================
const Log = {
  write(msg) {
    const el = document.getElementById("log");
    el.innerText += "\n" + msg;
    console.log(msg);
  }
};

// =========================
// API MODULE
// =========================
const API = {
  async call(path) {
    const res = await fetch(GAS_URL + path);
    return await res.json();
  }
};

// =========================
// STATE MODULE
// =========================
const State = {
  async load() {
    return await API.call("?path=state");
  }
};

// =========================
// INSTALL MODULE
// =========================
const Install = {

  async reinstall() {

    Log.write("♻️ reinstall start");

    await API.call("?path=reset");

    Log.write("✔ reset done");

    document.getElementById("statusText").innerText =
      "Redirecting to setup...";

    setTimeout(() => {
      window.location.href = "setup.html";
    }, 800);
  },

  async reset() {

    Log.write("🧨 hard reset");

    const res = await API.call("?path=reset");

    Log.write("✔ reset complete: " + JSON.stringify(res));

    document.getElementById("bar").style.width = "0%";
  }
};

// =========================
// DASHBOARD CORE
// =========================
const Dashboard = {

  async init() {

    Log.write("🚀 dashboard booting...");

    try {

      const state = await State.load();

      document.getElementById("crmId").innerText = state.crmId || "-";
      document.getElementById("version").innerText = state.version || "-";

      if (state.crmUrl) {
        document.getElementById("crmUrl").href = state.crmUrl;
        document.getElementById("crmUrl").innerText = state.crmUrl;
      }

      Log.write("✔ state loaded");

    } catch (err) {
      Log.write("❌ state error: " + err.message);
    }
  },

  reinstall: Install.reinstall,
  reset: Install.reset
};

// =========================
// BOOT
// =========================
Dashboard.init();

</script>

</body>
</html>
