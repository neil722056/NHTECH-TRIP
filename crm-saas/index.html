<script>

const GAS_URL = "YOUR_GAS_URL";

// =========================
// ROUTER PRO ENGINE
// =========================
async function smartRoute(retry = 0) {

  console.log("🧭 Router Pro start, retry:", retry);

  try {

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 5000);

    const res = await fetch(GAS_URL + "?path=state", {
      signal: controller.signal
    });

    clearTimeout(timeout);

    const state = await res.json();

    console.log("📦 STATE:", state);

    // =========================
    // ROUTE LOGIC CORE
    // =========================
    if (state.installed === true) {

      console.log("➡️ route: dashboard");
      window.location.href = "dashboard.html";
      return;

    } else {

      console.log("➡️ route: setup");
      window.location.href = "setup.html";
      return;
    }

  } catch (err) {

    console.warn("⚠️ router error:", err.message);

    // =========================
    // AUTO RETRY (最多2次)
    // =========================
    if (retry < 2) {

      console.log("🔁 retry routing...");
      setTimeout(() => smartRoute(retry + 1), 1000);
      return;
    }

    // =========================
    // FALLBACK SAFE MODE
    // =========================
    console.log("🧯 fallback → setup");
    window.location.href = "setup.html";
  }
}

// =========================
// BOOT
// =========================
document.addEventListener("DOMContentLoaded", () => {
  smartRoute();
});

</script>
