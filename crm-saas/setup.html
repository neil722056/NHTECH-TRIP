<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CRM Setup</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 24px;
    }

    h2 {
      color: #60a5fa;
      margin-bottom: 16px;
    }

    .box {
      background: #1e293b;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .node {
      padding: 10px;
      margin: 6px 0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }

    .done { background: #22c55e; }
    .running { background: #f59e0b; }
    .wait { background: #334155; }
    .error { background: #ef4444; }

    .small {
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<h2 id="title">CRM Setup</h2>

<div class="box">
  <div id="flow"></div>
</div>

<div class="box">
  <div id="status">Booting...</div>
  <div id="msg" class="small"></div>
  <div id="meta" class="small"></div>
</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxS1JueOIcz4DdwJHxiA-9GqMhY4Z1cWyOBSrv5tIoF3kEnR9sqEEd1PrNsTDyLBuUb/exec";

/***********************
 * 🧠 FLAGS
 ***********************/
let installing = false;
let isReinstall = false;

/***********************
 * 🧠 FLOW NODES
 ***********************/
const nodes = [
  "CHECK PERMISSION",
  "CREATE SPREADSHEET",
  "CREATE TABLES",
  "WRITE CONFIG",
  "API READY",
  "FINALIZE"
];

/***********************
 * 🎨 RENDER FLOW
 ***********************/
function render(state) {

  const flow = document.getElementById("flow");
  flow.innerHTML = "";

  nodes.forEach((n, i) => {

    let cls = "node wait";

    if (state.status === "ERROR") {
      cls = "node error";
    } else if (parseInt(state.step) > i) {
      cls = "node done";
    } else if (parseInt(state.step) === i) {
      cls = "node running";
    }

    const div = document.createElement("div");
    div.className = cls;

    div.innerHTML = `
      <span>${i + 1}. ${n}</span>
      <span>${cls.replace("node ", "")}</span>
    `;

    flow.appendChild(div);
  });
}

/***********************
 * 📡 FETCH STATE
 ***********************/
async function fetchState() {

  const res = await fetch(GAS_URL + "?action=state&t=" + Date.now());
  const data = await res.json();

  const state = data.state || {};

  document.getElementById("status").innerText =
    "Status: " + state.status + " | Step: " + state.step;

  document.getElementById("msg").innerText =
    state.msg || "";

  document.getElementById("meta").innerText =
    "CRM ID: " + (state.crmId || "-");

  render(state);

  /**************************************************
   * 🚀 SMART BOOT LOGIC (FIXED LOOP VERSION)
   **************************************************/

  // 🟢 只在真正初始化才啟動
  if (
    !installing &&
    state.step === "0" &&
    state.status === "IDLE"
  ) {
    startInstall();
  }

  /**************************************************
   * 🚀 RESET BOOT HANDLING
   **************************************************/
  if (
    isReinstall &&
    !installing &&
    state.step === "0"
  ) {
    setTimeout(() => {
      startInstall();
    }, 600);
  }

  /**************************************************
   * 🚀 SAFE REDIRECT
   **************************************************/
  if (state.status === "DONE") {
    window.location.href = "dashboard.html";
  }
}

/***********************
 * 🚀 INSTALL LOCK
 ***********************/
async function startInstall() {

  if (installing) return;

  installing = true;

  document.getElementById("status").innerText = "Installing...";

  await fetch(GAS_URL + "?action=install&t=" + Date.now());
}

/***********************
 * 🚨 REINSTALL DETECT
 ***********************/
const params = new URLSearchParams(window.location.search);

if (params.get("reinstall") === "1") {
  isReinstall = true;
  installing = false;
}

/***********************
 * 🚀 VERSION SYNC
 ***********************/
async function loadVersion() {

  try {

    const res = await fetch(GAS_URL + "?action=version&t=" + Date.now());
    const data = await res.json();

    document.getElementById("title").innerText =
      "CRM Setup (" + data.version + " Visual Engine)";

  } catch (e) {
    console.log("version load failed");
  }
}

/***********************
 * 🔁 LOOP
 ***********************/
setInterval(fetchState, 1000);

/***********************
 * 🚀 INIT
 ***********************/
loadVersion();
fetchState();

</script>

</body>
</html>
