<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>CRM Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      padding: 20px;
    }

    .box {
      background: #111827;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .row {
      margin: 6px 0;
    }

    button {
      padding: 8px 12px;
      margin-right: 8px;
      cursor: pointer;
    }

    .ok { color: #22c55e; }
    .warn { color: #fbbf24; }
    .bad { color: #ef4444; }
  </style>
</head>

<body>

<div class="box">
  <div class="title">CRM Dashboard</div>

  <div class="row">Version: <span data-bind-version>-</span></div>
  <div class="row">CRM ID: <span id="crmId">-</span></div>
  <div class="row">STEP: <span data-bind-step>-</span></div>
  <div class="row">MSG: <span data-bind-msg>-</span></div>
  <div class="row">STATUS: <span data-bind-status>-</span></div>
</div>

<div class="box">
  <button onclick="reset()">RESET</button>
  <button onclick="reinstall()">REINSTALL</button>
</div>

<div class="box">
  <div id="health">System: loading...</div>
</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxS1JueOIcz4DdwJHxiA-9GqMhY4Z1cWyOBSrv5tIoF3kEnR9sqEEd1PrNsTDyLBuUb/exec";

/**************************************************
 * 🚀 STATE LOOP (CONTROL PLANE ONLY)
 **************************************************/
setInterval(loadState, 1500);
loadState();

async function loadState() {

  const res = await fetch(GAS_URL + "?action=state&t=" + Date.now());
  const data = await res.json();
  const s = data.state || {};

  /**************************************************
   * 🧠 UI SYNC RULE
   **************************************************/
  bindUI(s);

  document.getElementById("crmId").innerText =
    s.crmId || "-";

  renderHealth(s);

  /**************************************************
   * 🔍 UI DRIFT DETECTOR
   **************************************************/
  detectUIDrift(s);
}

/**************************************************
 * 🧠 UI SYNC RULE (v8.4.1 CORE)
 **************************************************/
function bindUI(state) {

  document.querySelectorAll("[data-bind-version]")
    .forEach(el => el.innerText = state.version || "-");

  document.querySelectorAll("[data-bind-step]")
    .forEach(el => el.innerText = state.step || "-");

  document.querySelectorAll("[data-bind-msg]")
    .forEach(el => el.innerText = state.msg || "-");

  document.querySelectorAll("[data-bind-status]")
    .forEach(el => el.innerText = state.status || "-");
}

/**************************************************
 * 🧠 HEALTH RENDER
 **************************************************/
function renderHealth(s) {

  const el = document.getElementById("health");

  if (s.status === "DONE") {
    el.innerHTML = "System: <span class='ok'>READY</span>";
  } else if (s.status === "RUNNING") {
    el.innerHTML = "System: <span class='warn'>RUNNING</span>";
  } else if (s.status === "ERROR") {
    el.innerHTML = "System: <span class='bad'>ERROR</span>";
  } else {
    el.innerHTML = "System: <span class='warn'>IDLE</span>";
  }
}

/**************************************************
 * 🔍 UI DRIFT DETECTOR
 **************************************************/
function detectUIDrift(state) {

  const uiVersion =
    document.querySelector("[data-bind-version]")?.innerText || "";

  if (uiVersion && !uiVersion.includes(state.version)) {

    console.warn("⚠ UI DRIFT DETECTED", {
      ui: uiVersion,
      backend: state.version
    });

    document.body.style.border = "2px solid red";
  }
}

/**************************************************
 * 🔁 RESET
 **************************************************/
async function reset() {
  await fetch(GAS_URL + "?action=reset");
}

/**************************************************
 * 🚀 REINSTALL
 **************************************************/
async function reinstall() {
  await fetch(GAS_URL + "?action=reset");
}

</script>

</body>
</html>
